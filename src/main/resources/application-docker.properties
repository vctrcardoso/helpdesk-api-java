spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB:helpdesk}
spring.datasource.username=${POSTGRES_USER:helpdesk}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

management.endpoint.health.show-details=never

app.bootstrap-admin.enabled=${APP_ADMIN_ENABLED:false}
app.bootstrap-admin.name=${APP_ADMIN_NAME:Portfolio Admin}
app.bootstrap-admin.email=${APP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${APP_ADMIN_PASSWORD:}
